<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude AI Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #cc785c 0%, #b85c3a 100%);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header .logo {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    header h1 { font-size: 15px; font-weight: 600; }
    header p { font-size: 11px; opacity: 0.85; }

    #app-type-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }

    .api-key-section {
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .api-key-section label {
      font-size: 11px;
      font-weight: 600;
      color: #856404;
      display: block;
      margin-bottom: 5px;
    }

    .api-key-row {
      display: flex;
      gap: 6px;
    }

    .api-key-section input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ffc107;
      border-radius: 5px;
      font-size: 12px;
      background: white;
    }

    .api-key-section button {
      padding: 6px 12px;
      background: #856404;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
    }

    .mode-tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid #e0e0e0;
      flex-shrink: 0;
    }

    .mode-tab {
      flex: 1;
      padding: 10px 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .mode-tab.active {
      color: #cc785c;
      border-bottom-color: #cc785c;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .context-info {
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #e8e8e8;
      font-size: 11px;
      color: #555;
    }

    .context-info strong { color: #333; }

    .context-btn {
      margin-top: 7px;
      padding: 5px 10px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      width: 100%;
    }

    .context-btn:hover { background: #e4e4e4; }

    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.5;
      min-height: 80px;
    }

    textarea:focus { outline: none; border-color: #cc785c; }

    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .quick-prompts span {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      width: 100%;
      margin-bottom: 2px;
    }

    .quick-btn {
      padding: 4px 10px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      color: #444;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      background: #cc785c;
      color: white;
      border-color: #cc785c;
    }

    .send-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #cc785c, #b85c3a);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { opacity: 0.9; }

    .response-area {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #333;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .response-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      flex: 1;
      padding: 7px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: #cc785c;
      color: white;
      border-color: #cc785c;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
      font-size: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #eee;
      border-top-color: #cc785c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    #status-msg {
      font-size: 11px;
      text-align: center;
      padding: 4px;
      border-radius: 4px;
    }

    .status-ok { color: #2e7d32; background: #e8f5e9; }
    .status-err { color: #c62828; background: #ffebee; }
  </style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <div>
    <h1>Claude AI</h1>
    <p>Anthropic</p>
  </div>
  <div id="app-type-badge">Excel</div>
</header>

<div class="api-key-section">
  <label>🔑 Anthropic API Key</label>
  <div class="api-key-row">
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button onclick="saveApiKey()">저장</button>
  </div>
</div>

<div class="mode-tabs">
  <div class="mode-tab active" onclick="switchMode('generate')" id="tab-generate">✍️ 생성</div>
  <div class="mode-tab" onclick="switchMode('analyze')" id="tab-analyze">🔍 분석</div>
  <div class="mode-tab" onclick="switchMode('insert')" id="tab-insert">📥 삽입</div>
</div>

<div class="main-content">

  <!-- Context Info -->
  <div class="context-info">
    <strong id="context-label">현재 문서 컨텍스트</strong><br>
    <span id="context-desc">버튼을 눌러 현재 선택 영역을 가져오세요</span>
    <button class="context-btn" onclick="getContext()">📋 현재 선택/슬라이드 가져오기</button>
  </div>

  <!-- Quick prompts -->
  <div class="quick-prompts">
    <span>빠른 프롬프트</span>
    <button class="quick-btn" onclick="setPrompt('이 내용을 요약해줘')">요약</button>
    <button class="quick-btn" onclick="setPrompt('이 내용을 개선해줘')">개선</button>
    <button class="quick-btn" onclick="setPrompt('이 데이터를 분석해줘')">분석</button>
    <button class="quick-btn" onclick="setPrompt('번역해줘 (영어 → 한국어)')">번역</button>
    <button class="quick-btn" onclick="setPrompt('이 내용으로 슬라이드 발표 스크립트를 작성해줘')">스크립트</button>
    <button class="quick-btn" onclick="setPrompt('이 데이터로 인사이트 3가지를 도출해줘')">인사이트</button>
  </div>

  <!-- Prompt Input -->
  <textarea id="prompt-input" rows="4" placeholder="Claude에게 질문하거나 요청하세요..."></textarea>

  <!-- Send Button -->
  <button class="send-btn" id="send-btn" onclick="sendToClaude()">
    Claude에게 보내기 ↗
  </button>

  <div id="status-msg" class="hidden"></div>

  <!-- Loading -->
  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <span>Claude가 생각 중...</span>
  </div>

  <!-- Response -->
  <div id="response-area" class="response-area hidden"></div>

  <!-- Response Actions -->
  <div class="response-actions hidden" id="response-actions">
    <button class="action-btn" onclick="insertResponse()">📥 문서에 삽입</button>
    <button class="action-btn" onclick="copyResponse()">📋 복사</button>
    <button class="action-btn" onclick="clearAll()">🗑 지우기</button>
  </div>

</div>

<script src="taskpane.js"></script>
</body>
</html>
